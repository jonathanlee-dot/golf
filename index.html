<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="On The Tee">
<meta name="theme-color" content="#0e1410">
<title>On The Tee — Golf Training</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230e1410'/%3E%3Ccircle cx='90' cy='90' r='42' fill='none' stroke='%236b9777' stroke-width='6'/%3E%3Ccircle cx='90' cy='90' r='8' fill='%236b9777'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1410;
    --bg-translucent: rgba(14, 20, 16, 0.85);
    --surface: #1a2520;
    --surface-done: #16231c;
    --border: #2a3832;
    --ink: #f4ede1;
    --cream: #f4ede1;
    --muted: #8a9a90;
    --accent: #6b9777;
    --accent-deep: #4a6b54;
    --accent-glow: rgba(107, 151, 119, 0.2);
    --font-display: 'Bricolage Grotesque', -apple-system, sans-serif;
    --font-body: 'Fraunces', Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--cream);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overscroll-behavior-y: none;
  }

  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(circle at 20% 30%, rgba(107, 151, 119, 0.04) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(107, 151, 119, 0.03) 0%, transparent 50%);
    z-index: 0;
  }

  .app {
    max-width: 28rem;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 5rem;
    position: relative;
    z-index: 1;
  }

  button {
    background: none;
    border: none;
    color: inherit;
    font: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  a { color: inherit; text-decoration: none; }

  .display { font-family: var(--font-display); }
  .body-font { font-family: var(--font-body); }

  /* HOME */
  .header-eyebrow {
    font-family: var(--font-display);
    font-size: 0.625rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }

  .header-title {
    font-family: var(--font-display);
    font-size: 2.25rem;
    font-weight: 800;
    letter-spacing: -0.025em;
    line-height: 0.95;
    color: var(--ink);
  }

  .header-date {
    font-family: var(--font-body);
    font-style: italic;
    color: var(--muted);
    font-size: 0.875rem;
    margin-top: 0.5rem;
  }

  /* Streak card */
  .streak-card {
    margin: 1.75rem 0 1.5rem;
    padding: 1.25rem;
    border-radius: 1rem;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
    box-shadow: 0 6px 24px -8px rgba(74, 124, 89, 0.5);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: transform 0.15s;
  }
  .streak-card:active { transform: scale(0.99); }

  .streak-label {
    font-family: var(--font-display);
    font-size: 0.625rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.8;
    color: var(--cream);
  }

  .streak-num {
    font-family: var(--font-display);
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    color: var(--cream);
    margin-top: 0.25rem;
  }

  .streak-unit {
    font-size: 0.875rem;
    opacity: 0.9;
    color: var(--cream);
    margin-left: 0.5rem;
  }

  .streak-arrow {
    font-family: var(--font-display);
    font-size: 0.625rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
    color: var(--cream);
    margin-top: 0.5rem;
    text-align: right;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    background: var(--surface);
    border-radius: 999px;
    padding: 0.25rem;
    margin-bottom: 1.25rem;
  }

  .mode-btn {
    flex: 1;
    padding: 0.625rem 0;
    border-radius: 999px;
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.2s;
  }

  .mode-btn.active {
    background: var(--ink);
    color: #1a2520;
  }

  /* Day cards */
  .day-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .day-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 1rem;
    text-align: left;
    width: 100%;
    transition: transform 0.15s;
  }
  .day-card:active { transform: scale(0.985); }

  .day-card.complete {
    border-color: var(--accent);
    box-shadow: inset 0 0 0 2px var(--accent-glow);
  }

  .day-card-content { flex: 1; min-width: 0; }

  .day-card-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
  }

  .day-card-label {
    font-family: var(--font-display);
    font-size: 0.625rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .day-card-badge {
    font-size: 0.5625rem;
    letter-spacing: 0.15em;
    padding: 0.125rem 0.5rem;
    border-radius: 999px;
    background: var(--accent);
    color: var(--cream);
    font-family: var(--font-display);
  }

  .day-card-focus {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.015em;
  }

  .day-card-progress {
    margin-top: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    border-radius: 999px;
    background: var(--bg);
    overflow: hidden;
  }

  .progress-bar-inner {
    height: 100%;
    background: var(--ink);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .day-card.complete .progress-bar-inner { background: var(--accent); }

  .progress-count {
    font-size: 0.6875rem;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
  }

  .chevron-right {
    margin-left: 0.75rem;
    opacity: 0.4;
    color: var(--ink);
  }

  /* Footer */
  .footer {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .footer-link {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    font-size: 0.75rem;
    color: var(--muted);
  }

  details { margin-top: 1rem; }

  summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 0.375rem;
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  summary::-webkit-details-marker { display: none; }

  details[open] .legend-chevron { transform: rotate(90deg); }
  .legend-chevron { transition: transform 0.2s; }

  .legend-grid {
    margin-top: 0.75rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.375rem 0.75rem;
  }

  .legend-item { display: flex; gap: 0.5rem; font-size: 0.6875rem; }
  .legend-abbr { font-weight: 700; color: var(--ink); width: 1.5rem; }
  .legend-full { color: var(--muted); }

  .equipment {
    margin-top: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.375rem;
  }

  .equipment a {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    font-size: 0.6875rem;
    color: var(--accent);
  }

  /* DAY VIEW */
  .day-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg-translucent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem 0.75rem;
    margin: -1.5rem -1.25rem 0;
  }

  .day-header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .back-btn, .reset-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    font-family: var(--font-display);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .reset-btn {
    padding: 0.375rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.625rem;
    gap: 0.375rem;
  }

  .day-title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .day-title {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.025em;
    color: var(--ink);
  }

  .day-progress-text {
    font-size: 0.875rem;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
  }

  .day-progress-bar {
    margin-top: 0.5rem;
    height: 4px;
    border-radius: 999px;
    background: var(--surface);
    overflow: hidden;
  }

  .sections { padding: 1.25rem 0 3rem; display: flex; flex-direction: column; gap: 1.75rem; }

  .section-title {
    font-family: var(--font-display);
    font-size: 0.6875rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .section-sub {
    font-size: 0.625rem;
    color: var(--muted);
    margin-top: 0.125rem;
  }

  .section-note {
    font-style: italic;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface);
    padding: 0.75rem;
    border-radius: 0.5rem;
    border-left: 2px solid var(--accent);
    margin: 0.75rem 0;
  }

  .exercise-list {
    margin-top: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  /* Exercise card */
  .exercise {
    display: flex;
    gap: 0.75rem;
    padding: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    transition: all 0.2s;
  }

  .exercise.done {
    background: var(--surface-done);
    border-color: var(--accent);
    opacity: 0.85;
  }

  .check {
    flex-shrink: 0;
    width: 1.75rem;
    height: 1.75rem;
    border-radius: 999px;
    border: 2px solid var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .check:active { transform: scale(0.9); }
  .exercise.done .check { background: var(--accent); border-color: var(--accent); }

  .check-icon {
    width: 14px;
    height: 14px;
    color: var(--cream);
    stroke-width: 3;
    opacity: 0;
  }
  .exercise.done .check-icon { opacity: 1; }

  .ex-content { flex: 1; min-width: 0; }

  .ex-head {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
  }

  .ex-order {
    font-size: 0.625rem;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    padding: 0.125rem 0.375rem;
    border-radius: 0.25rem;
    background: var(--bg);
    color: var(--muted);
  }

  .ex-name {
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 1rem;
    line-height: 1.3;
    color: var(--ink);
  }

  .exercise.done .ex-name {
    text-decoration: line-through;
    text-decoration-color: var(--muted);
  }

  .ex-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem 0.75rem;
    margin-top: 0.375rem;
  }

  .stat {
    display: inline-flex;
    align-items: baseline;
    gap: 0.25rem;
  }

  .stat-label {
    font-family: var(--font-display);
    font-size: 0.5625rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-value {
    font-size: 0.75rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }

  .ex-notes {
    margin-top: 0.5rem;
    font-size: 0.6875rem;
    font-style: italic;
    line-height: 1.5;
    color: var(--muted);
  }

  .watch-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    margin-top: 0.625rem;
    padding: 0.375rem 0.75rem;
    border-radius: 999px;
    background: var(--ink);
    color: #1a2520;
    font-family: var(--font-display);
    font-size: 0.6875rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .play-icon { width: 11px; height: 11px; fill: currentColor; }

  /* HISTORY */
  .history-title {
    font-family: var(--font-display);
    font-size: 1.875rem;
    font-weight: 800;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin-top: 1.25rem;
    margin-bottom: 0.25rem;
  }

  .history-sub {
    font-style: italic;
    font-size: 0.875rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .history-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.75rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    padding: 1rem;
  }

  .stat-card-head {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--accent);
    margin-bottom: 0.375rem;
  }

  .stat-card-label {
    font-family: var(--font-display);
    font-size: 0.625rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-card-value {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--ink);
  }

  .history-empty {
    text-align: center;
    padding: 3rem 0;
    font-size: 0.875rem;
    color: var(--muted);
  }

  .history-empty svg {
    width: 32px;
    height: 32px;
    margin: 0 auto 0.75rem;
    opacity: 0.4;
    display: block;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .history-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    padding: 1rem;
  }

  .history-entry-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .history-entry-date {
    font-family: var(--font-display);
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--ink);
  }

  .history-entry-today {
    font-size: 0.625rem;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .history-entry-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--ink);
    padding: 0.25rem 0;
  }

  .history-entry-progress {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-variant-numeric: tabular-nums;
  }

  .hidden { display: none !important; }
</style>
</head>

<div id="app" class="app"></div>

// ============================================================
// STORAGE (localStorage)
// ============================================================

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function formatDateLabel(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function loadProgress() {
  try {
    const data = localStorage.getItem(`progress:${todayKey()}`);
    return data ? JSON.parse(data) : {};
  } catch { return {}; }
}

function saveProgress(progress) {
  try {
    localStorage.setItem(`progress:${todayKey()}`, JSON.stringify(progress));
  } catch (e) { console.error(e); }
}

function loadHistory() {
  try {
    const data = localStorage.getItem("history:summary");
    return data ? JSON.parse(data) : {};
  } catch { return {}; }
}

function saveHistory(history) {
  try {
    localStorage.setItem("history:summary", JSON.stringify(history));
  } catch (e) { console.error(e); }
}

function loadMode() {
  try {
    return localStorage.getItem("mode") || "daily";
  } catch { return "daily"; }
}

function saveMode(mode) {
  try { localStorage.setItem("mode", mode); } catch {}
}

// ============================================================
// STATE
// ============================================================

const state = {
  view: "home",
  mode: loadMode(),
  activeDayId: null,
  completed: loadProgress(),
  history: loadHistory()
};

function findDay(dayId) {
  for (const m of ["daily", "trip"]) {
    const d = PROGRAM[m].days.find(x => x.id === dayId);
    if (d) return d;
  }
  return null;
}

function countExercises(day) {
  return day.sections.reduce((acc, s) => acc + (s.exercises?.length || 0), 0);
}

function dayProgress(day) {
  const map = state.completed[day.id] || {};
  const total = countExercises(day);
  const done = Object.values(map).filter(Boolean).length;
  return { done, total, pct: total === 0 ? 0 : Math.round((done / total) * 100) };
}

function computeStreak() {
  let count = 0;
  const d = new Date();
  while (true) {
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    const day = state.history[key];
    const anyComplete = day && Object.values(day).some(v => v.total > 0 && v.done >= v.total);
    if (anyComplete) {
      count++;
      d.setDate(d.getDate() - 1);
    } else {
      if (key === todayKey() && count === 0) {
        d.setDate(d.getDate() - 1);
        continue;
      }
      break;
    }
  }
  return count;
}

function updateHistorySummary() {
  const today = todayKey();
  const summary = {};
  Object.entries(state.completed).forEach(([dayId, exMap]) => {
    const day = findDay(dayId);
    if (!day) return;
    const total = countExercises(day);
    const done = Object.values(exMap).filter(Boolean).length;
    summary[dayId] = { done, total };
  });
  state.history = { ...state.history, [today]: summary };
  saveHistory(state.history);
}

function toggleExercise(dayId, exKey) {
  const dayMap = { ...(state.completed[dayId] || {}) };
  dayMap[exKey] = !dayMap[exKey];
  state.completed = { ...state.completed, [dayId]: dayMap };
  saveProgress(state.completed);
  updateHistorySummary();
  render();
}

function resetDay(dayId) {
  const next = { ...state.completed };
  delete next[dayId];
  state.completed = next;
  saveProgress(state.completed);
  updateHistorySummary();
  render();
}

function setMode(m) {
  state.mode = m;
  saveMode(m);
  render();
}

function openDay(id) {
  state.activeDayId = id;
  state.view = "day";
  window.scrollTo(0, 0);
  render();
}

function back() {
  state.view = "home";
  window.scrollTo(0, 0);
  render();
}

function openHistory() {
  state.view = "history";
  window.scrollTo(0, 0);
  render();
}

// ============================================================
// HTML helpers
// ============================================================

function escapeHTML(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function render() {
  const root = document.getElementById("app");
  if (state.view === "home") {
    root.innerHTML = renderHome();
    bindHome();
  } else if (state.view === "day") {
    root.innerHTML = renderDay();
    bindDay();
  } else if (state.view === "history") {
    root.innerHTML = renderHistory();
    bindHistory();
  }
}

}

function bindDay() {
  document.getElementById("backBtn").addEventListener("click", back);
  document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("Reset all completed exercises for this day?")) {
      resetDay(state.activeDayId);
    }
  });
  document.querySelectorAll(".check[data-exkey]").forEach(btn => {
    btn.addEventListener("click", () => toggleExercise(state.activeDayId, btn.dataset.exkey));
  });
}

function renderHistory() {
  const sortedDates = Object.keys(state.history).sort((a, b) => b.localeCompare(a));
  const totalWorkouts = sortedDates.reduce((acc, date) => {
    const day = state.history[date];
    const completed = Object.values(day).filter(v => v.total > 0 && v.done >= v.total).length;
    return acc + completed;
  }, 0);
  const streak = computeStreak();

  const entriesHTML = sortedDates.map(date => {
    const day = state.history[date];
    const entries = Object.entries(day).filter(([_, v]) => v.total > 0 && v.done > 0);
    if (entries.length === 0) return "";
    const rowsHTML = entries.map(([dayId, v]) => {
      const dayObj = findDay(dayId);
      const isFull = v.done >= v.total;
      return `
        <div class="history-entry-row">
          <span>${dayObj ? escapeHTML(`${dayObj.name} — ${dayObj.focus}`) : escapeHTML(dayId)}</span>
          <div class="history-entry-progress">
            ${isFull ? `<span style="color: var(--accent)">${ICONS.checkSmall}</span>` : ''}
            <span style="color: ${isFull ? 'var(--accent)' : 'var(--muted)'}">${v.done}/${v.total}</span>
          </div>
        </div>
      `;
    }).join("");
    return `
      <div class="history-entry">
        <div class="history-entry-head">
          <span class="history-entry-date">${escapeHTML(formatDateLabel(date))}</span>
          <span class="history-entry-today">${date === todayKey() ? "TODAY" : ""}</span>
        </div>
        <div>${rowsHTML}</div>
      </div>
    `;
  }).join("");

  const hasEntries = sortedDates.some(d => {
    return Object.values(state.history[d]).some(v => v.total > 0 && v.done > 0);
  });

  return `
    <div>
      <button class="back-btn" id="backBtn" style="margin-bottom: 1.25rem;">
        ${ICONS.chevronLeft}
        Back
      </button>
      <h2 class="history-title">History</h2>
      <div class="history-sub">Every rep counts.</div>
      <div class="history-stats">
        <div class="stat-card">
          <div class="stat-card-head">
            ${ICONS.flameSmall}
            <span class="stat-card-label">Streak</span>
          </div>
          <div class="stat-card-value">${streak} ${streak === 1 ? "day" : "days"}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-head">
            ${ICONS.trophy}
            <span class="stat-card-label">Workouts</span>
          </div>
          <div class="stat-card-value">${totalWorkouts}</div>
        </div>
      </div>
      ${hasEntries ? `<div class="history-list">${entriesHTML}</div>` : `
        <div class="history-empty">
          ${ICONS.calendar}
          No history yet. Get to work.
        </div>
      `}
    </div>
  `;
}

function bindHistory() {
  document.getElementById("backBtn").addEventListener("click", back);
}

// Initial render
render();
</script>
</body>
</html>
